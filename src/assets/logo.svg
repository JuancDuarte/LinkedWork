<svg width="360" height="130" viewBox="0 0 360 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad-main" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6F33C8"/>
      <stop offset="100%" stop-color="#E4478D"/>
    </linearGradient>
    <linearGradient id="grad-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3C148C"/>
      <stop offset="100%" stop-color="#FF4D82"/>
    </linearGradient>
  </defs>

  <!-- Grid + nodes (flat style) -->
  <g opacity="0.95">
    <line x1="30" y1="30" x2="30" y2="90" stroke="#6B27C2" stroke-width="6" stroke-linecap="round"/>
    <line x1="78" y1="30" x2="78" y2="90" stroke="#6B27C2" stroke-width="6" stroke-linecap="round"/>
    <line x1="30" y1="30" x2="78" y2="30" stroke="#6B27C2" stroke-width="6" stroke-linecap="round"/>
    <line x1="30" y1="90" x2="78" y2="90" stroke="#6B27C2" stroke-width="6" stroke-linecap="round"/>

    <circle cx="30" cy="30" r="6" fill="#6B27C2"/>
    <circle cx="78" cy="30" r="6" fill="#6B27C2"/>
    <circle cx="30" cy="90" r="6" fill="#6B27C2"/>
    <circle cx="78" cy="90" r="6" fill="#6B27C2"/>

    <circle cx="54" cy="30" r="5" fill="#E4478D"/>
    <circle cx="54" cy="90" r="5" fill="#E4478D"/>
    <circle cx="30" cy="60" r="5" fill="#E4478D"/>
    <circle cx="78" cy="60" r="5" fill="#E4478D"/>
  </g>

  <!-- Central LW -->
  <text x="40" y="72" font-family="Segoe UI, system-ui, sans-serif" font-size="40" font-weight="900" fill="#291850" letter-spacing="-1">
    LW
  </text>

  <!-- Shield + check (flat) -->
  <path d="M104 34h46c5 0 10 5 10 10v44c0 20-14 38-34 42-20-4-34-22-34-42V44c0-5 5-10 10-10Z" fill="url(#grad-main)"/>
  <path d="M124 66l16 16 28-28" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Text -->
  <text x="168" y="82" font-family="Segoe UI, system-ui, sans-serif" font-size="44" font-weight="800" fill="url(#grad-text)" dominant-baseline="middle" letter-spacing="-0.5">
    Linked
    <tspan fill="url(#grad-main)">Work</tspan>
  </text>
</svg>
